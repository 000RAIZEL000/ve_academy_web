[variables]
PYTHON_VERSION = "3.11"

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "python manage.py collectstatic --noinput"
]

[phases.deploy]
cmds = [
  "python manage.py migrate --noinput",
  "python manage.py poblar_db"
]

[start]
cmd = "gunicorn ve_academy.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
