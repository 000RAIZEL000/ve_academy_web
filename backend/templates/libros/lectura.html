{% extends 'base.html' %}
{% load static %}
{% block title %}{{ libro.titulo }} — V&E Academy{% endblock %}

{% block content %}
<div class="lectura-container">
  <!-- Portada lateral -->
  <div class="lectura-portada-wrap">
    <img src="{{ libro.portada_url }}" alt="{{ libro.titulo }}" class="lectura-portada">
    <div style="margin-top:16px;text-align:center;">
      <div style="font-size:.85rem;color:var(--gris);font-weight:600;">Lector</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;">
        <img src="{% static 'img/avatars/'|add:estudiante.avatar|add:'.png' %}"
             alt="{{ estudiante.avatar }}"
             style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--verde);">
        <span style="font-weight:700;">{{ estudiante.nombre }}</span>
      </div>
    </div>
  </div>

  <!-- Texto -->
  <div>
    <div class="lectura-card">
      <h1 class="lectura-titulo">{{ libro.titulo }}</h1>
      <p class="lectura-texto">{{ libro.texto }}</p>
      <div class="lectura-acciones">
        <a href="{% url 'actividades:actividades' libro.slug %}" class="btn btn-verde btn-grande">
          ✍️ ¡Hacer actividades!
        </a>
        <a href="{% url 'libros:lista' %}" class="btn btn-gris">
          ← Volver
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
